<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berry & Cream | Admin Panel</title>

<link rel="stylesheet" href="admin.css">
<link rel="icon" type="image/png" href="./Images/site-logo.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>


<!-- ===== MODAL ===== -->
<div class="modal fade" id="detailsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header modal-header-custom">
                <h5 class="modal-title">Order Details</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalContent"></div>
        </div>
    </div>
</div>

<!-- Rejection -->

<div class="modal fade" id="rejectOrder" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header modal-header-custom">
                <h5 class="modal-title">Do you want to Reject this Order?</h5>
                
                <!-- <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button> -->
            </div>
            <div class="button-container">
            <button type="button" class="btn-reject" onclick="reject()">Reject</button>
             <button type="button" class="btn-reject" data-bs-dismiss="modal">Close</button>
        </div>
            <div class="modal-body" id="modalContent"></div>
        </div>
    </div>
</div>

<!-- HEADER -->
<header class="admin-header">
    <h2 class="logo">Berry<span>&</span>Cream</h2>
    <ul>
   
      <a href="index.html">Home</a>
      <button onclick="logout()">Logout</button>
    </ul>
   
</header>

<!-- DASHBOARD -->
<section class="dashboard">

    <div class="top-section">
        <div>
            <h3>Orders Dashboard</h3>
            <p id="today"></p>
        </div>

        <input type="text" id="searchName" placeholder="Search customer..." onkeyup="searchOrders()">

    </div>

    <div class="orders-box">
        <table>
            <thead>
                <tr>
                    <th>Customer</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="orderTableBody"></tbody>
        </table>
    </div>
</section>

<!-- DETAILS MODAL -->
<div class="modal fade" id="orderModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Order Details</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
</div>

<footer>
    <p>Berry & Cream Admin © 2026</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="admin.js"></script>
<script src="api.js"></script>
</body>
</html>
